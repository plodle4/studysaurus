<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studysaurus AI Habit Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg-color: #050814; --neon-blue: #22d3ee; --neon-green: #2ed573; --neon-purple: #a855f7; --terminal-text: #f8fafc; }
        body { background-color: var(--bg-color); color: var(--terminal-text); font-family: 'Roboto Mono', monospace; padding: 20px; }
        .panel { background: #0f1626; border: 2px solid #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .btn-chunky { font-family: 'Fredoka', sans-serif; background: #00cdff; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .ai-terminal { background: #0b0f19; padding: 15px; border-radius: 12px; height: 150px; overflow-y: auto; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>🦕 STUDYSAURUS.AI</h2>
        <div id="ai-terminal-display" class="ai-terminal"></div>
        <textarea id="goal-input" style="width:100%; height:80px;"></textarea>
        <button id="btn-add-goal" class="btn-chunky">Split & Load Tasks</button>
    </div>

    <div class="panel">
        <h2>👥 // STUDY_CIRCLE_MULTIPLAYER</h2>
        <input type="text" id="circle-peer-id-box" readonly placeholder="Your ID...">
        <input type="text" id="circle-target-input" placeholder="Buddy ID...">
        <button id="btn-circle-join" class="btn-chunky">Connect</button>
    </div>

    <script>
        // --- 1. PEERJS MULTIPLAYER LOGIC ---
        let peer = new Peer(); 
        let conn;

        peer.on('open', (id) => {
            document.getElementById('circle-peer-id-box').value = id;
            addAiMessage('SYSTEM', `Your ID: ${id}. Share this to link up!`);
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });

        document.getElementById('btn-circle-join').addEventListener('click', () => {
            const targetId = document.getElementById('circle-target-input').value;
            conn = peer.connect(targetId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => addAiMessage('CIRCLE', 'Connected to study buddy!'));
            conn.on('data', (data) => addAiMessage('BUDDY', data));
        }

        // --- 2. CORE ENGINE ---
        let state = { xp: 0, lvl: 1, goals: [] };

        function addAiMessage(prefix, content) {
            const term = document.getElementById('ai-terminal-display');
            term.innerHTML += `<div><strong>${prefix}:</strong> ${content}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        function handleInputExtraction() {
            const input = document.getElementById('goal-input');
            const lines = input.value.split('\n');
            lines.forEach(line => {
                if(line.trim()) state.goals.push({text: line, status: 'ready'});
            });
            input.value = '';
            addAiMessage('SYSTEM', `Loaded ${state.goals.length} tasks.`);
            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('ai-terminal-display');
            container.innerHTML = "<strong>TASKS:</strong><br>";
            state.goals.forEach((g, i) => {
                container.innerHTML += `<div><input type="checkbox" onchange="toggleTask(${i})"> ${g.text}</div>`;
            });
        }

        function toggleTask(i) {
            state.xp += 20;
            addAiMessage('SYSTEM', `XP Gained! Total: ${state.xp}`);
            if (conn) conn.send(`Buddy completed a task! XP: ${state.xp}`);
        }

        document.getElementById('btn-add-goal').addEventListener('click', handleInputExtraction);
    </script>
</body>
</html>
