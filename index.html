<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studysaurus AI Habit Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050814;
            --card-bg: #0f1626;
            --border-color: #1e293b;
            --neon-blue: #22d3ee;
            --neon-orange: #ff9f43;
            --neon-green: #2ed573;
            --neon-purple: #a855f7;
            --terminal-text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #111827 0%, #050814 100%),
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--terminal-text);
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 30px;
            overflow-x: hidden;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 22, 38, 0.9);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.1);
        }

        .logo {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--neon-green);
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(46, 213, 115, 0.4);
        }

        .stats-row { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .pills-group { display: flex; gap: 12px; align-items: center; }

        .streak-pill, .xp-pill {
            font-family: 'Fredoka', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 16px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .streak-pill { background: #1e293b; border: 2px solid #334155; color: #94a3b8; }
        .streak-pill.active { border-color: var(--neon-orange); color: var(--neon-orange); text-shadow: 0 0 10px rgba(255,159,67,0.4); animation: floatBadge 2s ease infinite alternate; }
        
        .xp-pill { background: #0f172a; border: 2px solid var(--neon-blue); color: var(--neon-blue); font-size: 0.95rem; box-shadow: 0 0 10px rgba(34,211,238,0.2); }

        .main-layout { display: grid; grid-template-columns: 1fr 420px; gap: 30px; padding: 30px 40px; flex: 1; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; padding: 15px; } }

        .panel {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 26px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Fredoka', sans-serif; font-size: 1.3rem; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }

        .input-box-wrapper { background: #0b0f19; border: 2px solid var(--border-color); border-radius: 16px; padding: 14px; margin-bottom: 20px; }
        .input-box-wrapper label { font-size: 0.75rem; color: #64748b; display: block; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        textarea, input[type="text"] { width: 100%; background: transparent; border: none; color: #fff; font-size: 0.95rem; font-family: inherit; }
        textarea { height: 75px; resize: none; }
        textarea:focus, input[type="text"]:focus { outline: none; }

        .btn-chunky {
            font-family: 'Fredoka', sans-serif;
            background: #00cdff; border: none; border-bottom: 4px solid #0099bc;
            color: #111; padding: 12px 24px; border-radius: 12px; cursor: pointer;
            font-weight: 700; font-size: 0.95rem; text-transform: uppercase;
            transition: all 0.1s ease; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-chunky:hover { filter: brightness(1.2); }
        .btn-chunky:active { transform: translateY(3px); border-bottom-width: 1px; margin-bottom: 3px; }

        .btn-add { background: var(--neon-green); border-bottom-color: #20a053; }
        .btn-motivation { background: var(--neon-purple); border-bottom-color: #7e22ce; color: #fff; width: 100%; }
        .btn-reset { background: transparent; border: 2px solid #ef4444; color: #ef4444; font-size: 0.75rem; padding: 6px 12px; border-radius: 10px; }
        .btn-juke { padding: 10px 20px; font-size: 0.85rem; color: #fff; }
        .btn-inc { padding: 4px 10px; font-size: 0.75rem; background: #1e293b; border: 2px solid #334155; border-bottom: 4px solid #334155; color: #fff; border-radius: 8px; font-family: 'Fredoka', sans-serif;}
        .btn-inc:active { transform: translateY(2px); border-bottom-width: 2px; }

        .objectives-list { list-style: none; display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .objective-item { display: flex; align-items: center; background: #0b0f19; border: 2px solid var(--border-color); padding: 16px; border-radius: 16px; transition: all 0.2s ease; }
        
        .status-ready { border-color: #334155; }
        .status-progress { border-color: var(--neon-orange); box-shadow: 0 0 15px rgba(255, 159, 67, 0.2); }
        .status-completed { border-color: var(--neon-green); opacity: 0.6; text-decoration: line-through; }

        .checkbox-container { position: relative; margin-right: 16px; cursor: pointer; display: flex; align-items: center; }
        .checkbox-container input { display: none; }
        .custom-checkmark { width: 26px; height: 26px; border: 2px solid #475569; border-radius: 8px; display: inline-block; background: #1e293b; transition: all 0.2s ease; }
        .checkbox-container input:checked + .custom-checkmark { background: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 15px rgba(46, 213, 115, 0.5); }

        .objective-text { flex: 1; font-size: 0.95rem; font-weight: 700; color: #e2e8f0; }
        .item-actions { display: flex; gap: 8px; }

        .btn-action-small { background: transparent; border: 2px solid #334155; color: #94a3b8; padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .btn-action-small:hover { border-color: #64748b; color: #fff; }

        .pomodoro-frame { width: 100%; background: #0b0f19; border: 2px solid var(--border-color); border-radius: 16px; padding: 15px; margin-bottom: 20px;}
        .timer-split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .timer-block-sub { background: #1e293b; border: 2px solid transparent; border-radius: 12px; padding: 10px 5px; text-align: center; transition: all 0.3s ease; }
        .timer-block-sub.active-core { border-color: var(--neon-orange); box-shadow: 0 0 15px rgba(255, 159, 67, 0.2); background: #2d1f1f; }
        .timer-label-sub { font-size: 0.65rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .pomo-time-display { font-family: 'Fredoka', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--neon-orange); text-shadow: 0 0 10px rgba(255, 159, 67, 0.3); margin-bottom: 8px; }
        .break-color { color: var(--neon-blue) !important; text-shadow: 0 0 10px rgba(34, 211, 238, 0.3) !important; }
        .inc-dec-group { display: flex; justify-content: center; gap: 6px; }
        .pomo-controls-main { display: flex; justify-content: center; gap: 8px; }
        .btn-pomo-action { font-size: 0.8rem; padding: 8px 16px; border-radius: 10px; width: 48%; color: #fff;}

        /* --- THE SVG DINO STAGE --- */
        .bot-stage { height: 160px; width: 100%; display: flex; justify-content: center; align-items: flex-end; position: relative; margin-bottom: 10px;}
        
        .hype-bot {
            width: 140px; height: 140px;
            position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            transform-origin: bottom center; transition: all 0.3s ease;
            cursor: pointer;
        }

        .dino-body-skin { width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-end; position: relative; z-index: 2; }
        
        /* Smooth breathing animation for the SVG */
        .dino-breathing svg { animation: breatheDino 4s ease-in-out infinite; transform-origin: bottom center; }
        @keyframes breatheDino { 0% { transform: scaleY(1) scaleX(1); } 50% { transform: scaleY(1.03) scaleX(0.98); } 100% { transform: scaleY(1) scaleX(1); } }

        .dino-label-tag { font-size: 0.7rem; background: rgba(11, 15, 25, 0.8); border: 1px solid var(--neon-blue); padding: 2px 10px; border-radius: 10px; color: var(--neon-blue); font-weight: bold; text-transform: uppercase; margin-top: -10px; z-index: 3; position: relative; }

        /* The violent pre-hatch shake */
        .egg-cracking { animation: violentShake 0.1s linear infinite !important; filter: drop-shadow(0 0 20px var(--neon-blue)); }
        @keyframes violentShake { 0% { transform: translate(2px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(2deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 60% { transform: translate(-2px, 2px) rotate(-1deg); } 80% { transform: translate(2px, -2px) rotate(2deg); } 100% { transform: translate(-1px, 1px) rotate(0deg); } }

        .animate-jump { animation: dinoBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes dinoBounce { 0% { transform: scaleY(0.8) translateY(0); } 40% { transform: scaleY(1.1) translateY(-40px) rotate(5deg); } 70% { transform: scaleY(0.95) translateY(0); } 100% { transform: scaleY(1) translateY(0); } }

        /* Full Screen Cinematic Overlay */
        .victory-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 8, 20, 0.96); z-index: 99999; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        
        .white-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100000; opacity: 0; pointer-events: none; }
        .trigger-flash { animation: cinematicFlash 1.2s ease-out forwards; }
        @keyframes cinematicFlash { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; display: none; } }

        .overlay-card { text-align: center; margin-bottom: 30px; transform: scale(1.5); }
        .overlay-card .dino-breathing svg { animation: hatchDanceLoop 1.5s ease-in-out infinite alternate; }
        @keyframes hatchDanceLoop { 0% { transform: translateY(0) rotate(-5deg); } 100% { transform: translateY(-15px) rotate(5deg); } }

        .accomplished-banner { font-family: 'Fredoka', sans-serif; font-size: 3.4rem; font-weight: 700; color: var(--neon-green); text-shadow: 0 0 30px rgba(46, 213, 115, 0.8); letter-spacing: 3px; text-align: center; animation: pulseBanner 1s infinite alternate; }
        @keyframes pulseBanner { from { transform: scale(0.98); } to { transform: scale(1.02); } }

        .ai-terminal { width: 100%; flex: 1; background: #0b0f19; border: 2px solid #3b0764; border-radius: 12px; padding: 16px; font-size: 0.85rem; line-height: 1.5; overflow-y: auto; max-height: 20vh; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .msg-system { color: var(--neon-purple); font-weight: bold; font-family: 'Fredoka', sans-serif; }

        /* Multiplayer panel mini styles */
        .circle-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        @media (max-width: 750px) { .circle-layout { grid-template-columns: 1fr; } }
        .chat-area { display: flex; flex-direction: column; height: 180px; background: #0b0f19; border-radius: 12px; border: 2px solid var(--border-color); padding: 10px; }
        .chat-log { flex: 1; overflow-y: auto; font-size: 0.8rem; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .buddy-metrics-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left; }
        .buddy-metrics-table th, .buddy-metrics-table td { padding: 8px; border-bottom: 1px solid var(--border-color); }
        .buddy-metrics-table th { color: var(--neon-blue); font-family: 'Fredoka', sans-serif; }
